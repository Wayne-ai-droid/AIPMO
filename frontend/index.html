<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书审批助手 - 我的审批</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f7fa;
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        
        /* 授权提示 */
        .auth-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .auth-banner.info {
            background: #d1ecf1;
            border-color: #17a2b8;
        }
        .auth-banner.success {
            background: #d4edda;
            border-color: #28a745;
        }
        .auth-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .auth-btn:hover { background: #5a6fd6; }
        
        /* 用户信息显示 */
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 8px;
        }
        .tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            color: #666;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #667eea; }
        .stat-card .label { font-size: 14px; color: #999; }
        
        .approval-list {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }
        .list-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .approval-item { padding: 20px; border-bottom: 1px solid #f0f0f0; }
        .item-title { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
        .item-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        .type-pending { background: #e3f2fd; color: #1976d2; }
        .type-approved { background: #e8f5e9; color: #388e3c; }
        .item-meta { display: flex; gap: 20px; font-size: 13px; color: #666; margin: 10px 0; }
        .item-actions { display: flex; gap: 10px; }
        .btn { padding: 6px 16px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; }
        .btn-primary { background: #667eea; color: white; border-color: #667eea; }
        
        .empty { text-align: center; padding: 60px; color: #999; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 飞书审批助手</h1>
            <div id="userStatus">检查授权状态...</div>
        </div>
        
        <!-- 授权提示 -->
        <div id="authBanner" class="auth-banner" style="display: none;">
            <div>
                <strong>🔐 需要授权</strong>
                <p style="margin: 5px 0 0 0; font-size: 14px;">请先授权飞书账号，才能获取您的审批数据</p>
            </div>
            <button class="auth-btn" onclick="startAuth()">立即授权</button>
        </div>
        
        <!-- 已授权信息 -->
        <div id="userInfo" class="auth-banner success" style="display: none;">
            <div class="user-info">
                <span>👤</span>
                <span id="userName">已授权</span>
                <button class="btn" onclick="logout()">退出</button>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('all')">全部</button>
            <button class="tab" onclick="switchTab('initiated')">我发起的</button>
            <button class="tab" onclick="switchTab('processing')">我办理的</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalCount">0</div>
                <div class="label">全部审批</div>
            </div>
            <div class="stat-card">
                <div class="number" id="pendingCount">0</div>
                <div class="label">待处理</div>
            </div>
            <div class="stat-card">
                <div class="number" id="initiatedCount">0</div>
                <div class="label">我发起的</div>
            </div>
            <div class="stat-card">
                <div class="number" id="processingCount">0</div>
                <div class="label">我办理的</div>
            </div>
        </div>
        
        <div class="approval-list">
            <div class="list-header">
                <h2>审批列表</h2>
                <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
            </div>
            <div id="approvalList">
                <div class="loading">检查授权状态...</div>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE = 'http://127.0.0.1:8000';
        let currentTab = 'all';
        let isAuthorized = false;
        
        // 页面加载时检查授权状态（包括URL参数）
        document.addEventListener('DOMContentLoaded', async function() {
            // 先检查URL是否有授权成功标记
            const urlParams = new URLSearchParams(window.location.search);
            const authSuccess = urlParams.get('auth');
            const urlUserId = urlParams.get('user_id');
            const urlUserName = urlParams.get('name');
            
            if (authSuccess === 'success' && urlUserId) {
                // URL中有授权成功标记，显示成功状态
                isAuthorized = true;
                showAuthorized({
                    open_id: urlUserId,
                    name: urlUserName || '已授权用户'
                });
                // 清理URL参数
                window.history.replaceState({}, document.title, window.location.pathname);
                // 加载数据
                loadData();
                return;
            }
            
            // 否则检查cookie中的授权状态
            await checkAuthStatus();
        });
        
        // 检查授权状态
        async function checkAuthStatus() {
            try {
                const response = await fetch(`${API_BASE}/auth/status`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.is_authorized) {
                    isAuthorized = true;
                    showAuthorized(data.user_info);
                    loadData();
                } else {
                    isAuthorized = false;
                    showUnauthorized();
                }
            } catch (error) {
                console.error('检查授权状态失败:', error);
                showUnauthorized();
            }
        }
        
        // 显示未授权状态
        function showUnauthorized() {
            document.getElementById('authBanner').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('userStatus').textContent = '未授权';
            document.getElementById('approvalList').innerHTML = `
                <div class="empty">
                    <div style="font-size: 48px;">🔐</div>
                    <div>请先完成飞书授权</div>
                    <button class="auth-btn" onclick="startAuth()" style="margin-top: 20px;">立即授权</button>
                </div>
            `;
        }
        
        // 显示已授权状态
        function showAuthorized(userInfo) {
            document.getElementById('authBanner').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userName').textContent = userInfo?.name || '已授权用户';
            document.getElementById('userStatus').textContent = '已授权';
        }
        
        // 开始授权 - 使用URL参数方案避免cookie跨域问题
        function startAuth() {
            // 生成一个随机的key，用于关联state
            const key = 'auth_' + Math.random().toString(36).substring(2, 15);
            // 存储在sessionStorage中
            sessionStorage.setItem('oauth_key', key);
            // 跳转到授权接口，带上key参数
            window.location.href = `${API_BASE}/auth/login?redirect_uri=${encodeURIComponent(key)}`;
        }
        
        // 退出登录
        async function logout() {
            try {
                await fetch(`${API_BASE}/auth/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
                checkAuthStatus();
            } catch (error) {
                console.error('退出失败:', error);
            }
        }
        
        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderList();
        }
        
        // 加载数据
        async function loadData() {
            if (!isAuthorized) {
                showUnauthorized();
                return;
            }
            
            const listContainer = document.getElementById('approvalList');
            listContainer.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/approvals?days=7`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.code === 401) {
                    // Token过期
                    isAuthorized = false;
                    showUnauthorized();
                    return;
                }
                
                window.approvalData = data.data || [];
                updateStats();
                renderList();
                
            } catch (error) {
                console.error('加载数据失败:', error);
                listContainer.innerHTML = `
                    <div class="empty">
                        <div style="font-size: 48px;">⚠️</div>
                        <div>加载失败，请重试</div>
                    </div>
                `;
            }
        }
        
        // 更新统计
        function updateStats() {
            const data = window.approvalData || [];
            document.getElementById('totalCount').textContent = data.length;
            document.getElementById('pendingCount').textContent = data.filter(i => i.status === 'PENDING').length;
            document.getElementById('initiatedCount').textContent = data.filter(i => i.initiator_id === 'ou_a795353f084e446e25c7074e04482728').length;
            document.getElementById('processingCount').textContent = data.filter(i => i.processor_id === 'ou_a795353f084e446e25c7074e04482728').length;
        }
        
        // 渲染列表
        function renderList() {
            const data = window.approvalData || [];
            const listContainer = document.getElementById('approvalList');
            
            let filtered = data;
            if (currentTab === 'initiated') {
                filtered = data.filter(i => i.initiator_id === 'ou_a795353f084e446e25c7074e04482728');
            } else if (currentTab === 'processing') {
                filtered = data.filter(i => i.processor_id === 'ou_a795353f084e446e25c7074e04482728');
            }
            
            if (filtered.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty">
                        <div style="font-size: 48px;">📭</div>
                        <div>暂无审批记录</div>
                    </div>
                `;
                return;
            }
            
            listContainer.innerHTML = filtered.map(item => {
                const statusClass = item.status === 'PENDING' ? 'type-pending' : 'type-approved';
                const statusText = item.status === 'PENDING' ? '待审批' : '已同意';
                return `
                    <div class="approval-item">
                        <div class="item-title">${item.title || '审批申请'}</div>
                        <span class="item-type ${statusClass}">${statusText}</span>
                        <div class="item-meta">
                            <span>👤 ${item.initiator_name || '-'}</span>
                            <span>📅 ${new Date(item.create_time).toLocaleString()}</span>
                        </div>
                        <div class="item-actions">
                            <button class="btn" onclick="viewDetail('${item.instance_code}')">查看</button>
                            ${item.status === 'PENDING' ? '<button class="btn btn-primary">AI分析</button>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function viewDetail(code) {
            alert(`审批详情: ${code}`);
        }
    </script>
</body>
</html>
